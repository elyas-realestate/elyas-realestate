    <script>
      document.addEventListener("DOMContentLoaded", async function () {
        const loading = document.getElementById("__bundler_loading");
        function setStatus(msg) {
          if (loading) loading.textContent = msg;
        }

        // Error sink persists across replaceWith since it's on window, not the DOM.
        window.addEventListener(
          "error",
          function (e) {
            var p = document.body || document.documentElement;
            var d =
              document.getElementById("__bundler_err") ||
              p.appendChild(document.createElement("div"));
            d.id = "__bundler_err";
            d.style.cssText =
              "position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto";
            d.textContent =
              (d.textContent ? d.textContent + String.fromCharCode(10) : "") +
              "[bundle] " +
              (e.message || e.type) +
              (e.filename ? " (" + e.filename.slice(0, 60) + ":" + e.lineno + ")" : "");
          },
          true
        );

        try {
          const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
          const templateEl = document.querySelector('script[type="__bundler/template"]');
          if (!manifestEl || !templateEl) {
            setStatus("Error: missing bundle data");
            console.error(
              "[bundler] Missing script tags — manifestEl:",
              !!manifestEl,
              "templateEl:",
              !!templateEl
            );
            return;
          }

          const manifest = JSON.parse(manifestEl.textContent);
          let template = JSON.parse(templateEl.textContent);

          const uuids = Object.keys(manifest);
          setStatus("Unpacking " + uuids.length + " assets...");

          const blobUrls = {};
          await Promise.all(
            uuids.map(async (uuid) => {
              const entry = manifest[uuid];
              try {
                const binaryStr = atob(entry.data);
                const bytes = new Uint8Array(binaryStr.length);
                for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

                let finalBytes = bytes;
                if (entry.compressed) {
                  if (typeof DecompressionStream !== "undefined") {
                    const ds = new DecompressionStream("gzip");
                    const writer = ds.writable.getWriter();
                    const reader = ds.readable.getReader();
                    writer.write(bytes);
                    writer.close();
                    const chunks = [];
                    let totalLen = 0;
                    while (true) {
                      const { done, value } = await reader.read();
                      if (done) break;
                      chunks.push(value);
                      totalLen += value.length;
                    }
                    finalBytes = new Uint8Array(totalLen);
                    let offset = 0;
                    for (const chunk of chunks) {
                      finalBytes.set(chunk, offset);
                      offset += chunk.length;
                    }
                  } else {
                    console.warn(
                      "DecompressionStream not available, asset " + uuid + " may not render"
                    );
                  }
                }

                blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
              } catch (err) {
                console.error("Failed to decode asset " + uuid + ":", err);
                blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
              }
            })
          );

          const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
          const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
          const resourceMap = {};
          for (const entry of extResources) {
            if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
          }

          setStatus("Rendering...");
          for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

          // Strip integrity + crossorigin — blob URLs from a file:// document inherit
          // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
          // The manifest bytes are ours; SRI protects against CDN compromise, not this.
          template = template
            .replace(/\s+integrity="[^"]*"/gi, "")
            .replace(/\s+crossorigin="[^"]*"/gi, "");

          const resourceScript =
            "<script>window.__resources = " +
            JSON.stringify(resourceMap)
              .split("</" + "script>")
              .join("<\\/" + "script>") +
            ";</" +
            "script>";
          // Inject after <head> so the DOCTYPE stays first; prepending the script
          // would push the parser into quirks mode. DOMParser always emits a <head>
          // (synthesizing one if the source HTML omitted it) but may carry
          // attributes through, so match the full opening tag. slice() rather than
          // replace() keeps us clear of $-pattern substitution in resourceScript.
          const headOpen = template.match(/<head[^>]*>/i);
          if (headOpen) {
            const i = headOpen.index + headOpen[0].length;
            template = template.slice(0, i) + resourceScript + template.slice(i);
          }

          // Parse the template and swap the root element. Scripts inserted via
          // DOMParser/replaceWith are inert per spec — re-create each with
          // createElement so they execute, awaiting onload for src scripts to
          // preserve ordering (React before ReactDOM before Babel before text/babel).
          const doc = new DOMParser().parseFromString(template, "text/html");
          document.documentElement.replaceWith(doc.documentElement);
          const dead = Array.from(document.scripts);
          for (const old of dead) {
            const s = document.createElement("script");
            for (const a of old.attributes) s.setAttribute(a.name, a.value);
            s.textContent = old.textContent;
            // text/babel scripts with a src: fetch and inline. transformScriptTags
            // does XHR against the src, but blob:null/ from a file:// origin is
            // silently dropped. Inlining makes it a plain inline babel script,
            // which transformScriptTags handles unconditionally.
            if ((s.type === "text/babel" || s.type === "text/jsx") && s.src) {
              const r = await fetch(s.src);
              s.textContent = await r.text();
              s.removeAttribute("src");
            }
            const p = s.src
              ? new Promise(function (r) {
                  s.onload = s.onerror = r;
                })
              : null;
            old.replaceWith(s);
            if (p) await p;
          }
          // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
          // which fired before we swapped the document. Trigger manually if present.
          if (window.Babel && typeof window.Babel.transformScriptTags === "function") {
            window.Babel.transformScriptTags();
          }
        } catch (err) {
          setStatus("Error unpacking: " + err.message);
          console.error("Bundle unpack error:", err);
        }
      });
    </script>

vated card */\n  --line:      #1F212B;\n  --line-2:    #2A2D3A;\n  --ink:       #F4F4F5;\n  --ink-2:     #A1A1AA;\n  --ink-3:     #71717A;\n  --gold:      #E8B86D;\n  --gold-2:    #F2C887;\n  --gold-deep: #C99548;\n  --ai:        #A78BFA;          /* purple AI accent */\n  --ai-2:      #C4B5FD;\n  --ai-deep:   #8B6CE0;\n  --green:     #4ADE80;\n  --red:       #F87171;\n}\n\n*,*::before,*::after{ box-sizing:border-box; }\nhtml,body{ margin:0; padding:0; }\nhtml{ background:var(--bg); }\nbody{\n  font-family: \"Tajawal\", \"Segoe UI\", system-ui, sans-serif;\n  background: var(--bg);\n  color: var(--ink);\n  font-size: 16px;\n  line-height: 1.65;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n  font-feature-settings: \"kern\", \"liga\";\n  overflow-x: hidden;\n}\n\na{ color: inherit; text-decoration: none; }\nbutton{ font-family: inherit; cursor: pointer; }\nimg,svg{ display:block; max-width:100%; }\n\n.wrap{ width:min(1200px, 92vw); margin: 0 auto; }\n\n/* ---------- Subtle global background ---------- */\n.bg-grid{\n  position: fixed; inset: 0; z-index: 0; pointer-events: none;\n  background-image:\n    radial-gradient(ellipse 50% 35% at 70% 0%, rgba(232,184,109,.07), transparent 65%),\n    radial-gradient(ellipse 40% 30% at 20% 10%, rgba(167,139,250,.06), transparent 65%),\n    linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px),\n    linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);\n  background-size: auto, auto, 56px 56px, 56px 56px;\n  mask-image: radial-gradient(ellipse 100% 80% at 50% 30%, #000 40%, transparent 90%);\n}\n\nmain{ position:relative; z-index:1; }\n\n/* ---------- NAV ---------- */\n.nav{\n  position: sticky; top:0; z-index: 50;\n  backdrop-filter: blur(14px) saturate(140%);\n  -webkit-backdrop-filter: blur(14px) saturate(140%);\n  background: rgba(10,10,12,.72);\n  border-bottom: 1px solid rgba(255,255,255,.04);\n}\n.nav-inner{\n  display:flex; align-items:center; justify-content:space-between;\n  height: 68px;\n}\n.brand{\n  display:flex; align-items:center; gap:10px;\n  font-weight: 800; font-size: 18px; letter-spacing: -.01em;\n}\n.brand-mark{\n  width:32px; height:32px; border-radius:8px;\n  display:grid; place-items:center;\n  background: linear-gradient(150deg, var(--gold), var(--gold-deep));\n  color:#1A1206; font-weight:900; font-size:15px;\n  box-shadow: 0 4px 16px -6px rgba(232,184,109,.5);\n}\n.nav-links{ display:flex; gap:28px; color: var(--ink-2); font-size:14.5px; font-weight:500; }\n.nav-links a{ transition: color .15s; }\n.nav-links a:hover{ color: var(--ink); }\n\n.btn{\n  display:inline-flex; align-items:center; gap:8px;\n  padding: 11px 20px; border-radius: 10px;\n  font-weight: 700; font-size: 14.5px;\n  border: 1px solid transparent;\n  transition: transform .12s ease, background .15s, border-color .15s, box-shadow .15s;\n  white-space: nowrap;\n}\n.btn:hover{ transform: translateY(-1px); }\n.btn:active{ transform: translateY(0); }\n\n.btn-primary{\n  background: var(--gold);\n  color: #1A1206;\n  box-shadow: 0 8px 24px -10px rgba(232,184,109,.5),\n              inset 0 1px 0 rgba(255,255,255,.35);\n}\n.btn-primary:hover{ background: var(--gold-2); }\n\n.btn-ghost{\n  background: rgba(255,255,255,.04);\n  border-color: var(--line);\n  color: var(--ink);\n}\n.btn-ghost:hover{ background: rgba(255,255,255,.07); border-color: var(--line-2); }\n\n.btn-line{\n  background: transparent;\n  border-color: var(--line-2);\n  color: var(--ink);\n}\n.btn-line:hover{ border-color: var(--gold); color: var(--gold); }\n\n@media (max-width: 760px){ .nav-links{ display:none; } }\n\n/* ---------- HERO ---------- */\n.hero{ padding: 96px 0 80px; position: relative; }\n.hero-grid{\n  display:grid;\n  grid-template-columns: 1.1fr .9fr;\n  gap: 64px;\n  align-items: center;\n}\n@media (max-width: 960px){\n  .hero{ padding: 64px 0 48px; }\n  .hero-grid{ grid-template-columns: 1fr; gap: 48px; }\n}\n\n.eyebrow{\n  display:inline-flex; align-items:center; gap:8px;\n  padding: 6px 12px;\n  border: 1px solid var(--line-2);\n  border-radius: 999px;\n  font-size: 13px; color: var(--ink-2); font-weight:500;\n  background: rgba(255,255,255,.02);\n}\n.eyebrow .dot{\n  width:6px; height:6px; border-radius:50%;\n  background: var(--ai);\n  box-shadow: 0 0 12px var(--ai);\n}\n\nh1.hero-title{\n  margin: 22px 0 18px;\n  font-size: clamp(36px, 5.2vw, 60px);\n  line-height: 1.12;\n  font-weight: 900;\n  letter-spacing: -.02em;\n  text-wrap: balance;\n}\nh1.hero-title .accent{ color: var(--gold); }\n\n.hero-sub{\n  font-size: 18px;\n  color: var(--ink-2);\n  max-width: 580px;\n  margin: 0 0 32px;\n  line-height: 1.75;\n  text-wrap: pretty;\n}\n\n.hero-cta{ display:flex; gap:12px; flex-wrap: wrap; }\n\n.hero-meta{\n  margin-top: 36px;\n  display:flex; gap:28px; flex-wrap:wrap;\n  font-size: 13.5px; color: var(--ink-3);\n}\n.hero-meta-item{ display:flex; align-items:center; gap:8px; }\n.hero-meta-item i{ color: var(--gold); }\n\n/* hero visual: live activity feed */\n.hero-visual{\n  position: relative;\n  background: linear-gradient(180deg, var(--bg-2), var(--bg-3));\n  border: 1px solid var(--line);\n  border-radius: 20px;\n  padding: 22px;\n  box-shadow: 0 30px 80px -30px rgba(0,0,0,.6),\n              inset 0 1px 0 rgba(255,255,255,.03);\n}\n.hero-visual::before{\n  content:\"\"; position:absolute; inset:-1px;\n  border-radius: 21px; pointer-events:none;\n  background: linear-gradient(150deg, rgba(232,184,109,.22), rgba(167,139,250,.18) 60%, transparent 80%);\n  -webkit-mask: linear-gradient(#000,#000) content-box, linear-gradient(#000,#000);\n  -webkit-mask-composite: xor; mask-composite: exclude;\n  padding: 1px;\n}\n\n.hv-head{\n  display:flex; align-items:center; justify-content:space-between;\n  padding-bottom: 14px; margin-bottom: 14px;\n  border-bottom: 1px solid var(--line);\n}\n.hv-head h4{ margin:0; font-size: 14px; font-weight: 700; color: var(--ink); }\n.hv-head .live{\n  display:inline-flex; align-items:center; gap:6px;\n  font-size: 12px; color: var(--green);\n}\n.hv-head .live::before{\n  content:\"\"; width:6px; height:6px; border-radius:50%;\n  background: var(--green); box-shadow: 0 0 8px var(--green);\n  animation: pulse 1.6s ease-in-out infinite;\n}\n@keyframes pulse{\n  0%,100%{ opacity:1; transform:scale(1); }\n  50%{ opacity:.45; transform:scale(.8); }\n}\n\n.activity{ display:flex; flex-direction:column; gap: 10px; }\n.act{\n  display:flex; align-items:flex-start; gap: 12px;\n  padding: 12px 14px;\n  background: rgba(255,255,255,.02);\n  border: 1px solid var(--line);\n  border-radius: 12px;\n  font-size: 13.5px;\n  animation: slideIn .5s ease both;\n}\n.act:nth-child(1){ animation-delay: .05s; }\n.act:nth-child(2){ animation-delay: .2s; }\n.act:nth-child(3){ animation-delay: .35s; }\n.act:nth-child(4){ animation-delay: .5s; }\n@keyframes slideIn{\n  from{ opacity:0; transform: translateY(6px); }\n  to{ opacity:1; transform: translateY(0); }\n}\n.act-ic{\n  flex: 0 0 32px; height:32px; border-radius:8px;\n  display:grid; place-items:center;\n  background: rgba(232,184,109,.10);\n  color: var(--gold);\n}\n.act-ic.ai{ background: rgba(167,139,250,.12); color: var(--ai); }\n.act-ic.green{ background: rgba(74,222,128,.10); color: var(--green); }\n.act-body{ flex:1; min-width:0; }\n.act-row{ display:flex; align-items:center; justify-content:space-between; gap: 8px; }\n.act-title{ font-weight: 700; color: var(--ink); font-size: 13.5px; }\n.act-time{ font-size: 11.5px; color: var(--ink-3); white-space: nowrap; }\n.act-text{ color: var(--ink-2); margin-top: 2px; line-height: 1.55; }\n.act-text b{ color: var(--gold); font-weight: 700; }\n\n.hv-foot{\n  margin-top: 14px; padding-top: 14px;\n  border-top: 1px solid var(--line);\n  display:flex; align-items:center; justify-content:space-between;\n  font-size: 12.5px; color: var(--ink-3);\n}\n.hv-foot .stat strong{ color: var(--ink); font-weight: 700; font-size: 14px; }\n\n/* ---------- SECTION SHELL ---------- */\nsection.s تفرّغ أنت للزيارات والإغلاقات.\n      <\/p>\n\n      <div class=\"hero-cta\">\n        <a href=\"/register\" class=\"btn btn-primary\"> ابدأ تجربتك\n          <i data-lucide=\"arrow-left\"><\/i>\n        <\/a>\n        <a href=\"#\" class=\"btn btn-line\">\n          <i data-lucide=\"play-circle\"><\/i>\n          شاهد عرضاً مباشراً\n        <\/a>\n      <\/div>\n\n      <div class=\"hero-meta\">\n        <div class=\"hero-meta-item\"><i data-lucide=\"shield-check\"><\/i> ملتزم بهيئة العقار (REGA)<\/div>\n        <div class=\"hero-meta-item\"><i data-lucide=\"receipt\"><\/i> فوترة ZATCA إلكترونياً<\/div>\n        <div class=\"hero-meta-item\"><i data-lucide=\"map-pin\"><\/i> الرياض — السعودية<\/div>\n      <\/div>\n    <\/div>\n\n    <!-- LIVE ACTIVITY VISUAL -->\n    <div class=\"hero-visual\">\n      <div class=\"hv-head\">\n        <h4>نشاط الفريق الآن<\/h4>\n        <span class=\"live\">يعملون مباشرةً<\/span>\n      <\/div>\n      <div class=\"activity\">\n        <div class=\"act\">\n          <div class=\"act-ic\"><i data-lucide=\"message-circle\"><\/i><\/div>\n          <div class=\"act-body\">\n            <div class=\"act-row\">\n              <span class=\"act-title\">موظف الواتساب<\/span>\n              <span class=\"act-time\">قبل ٤٢ ثانية<\/span>\n            <\/div>\n            <div class=\"act-text\">رد على <b>أبو فيصل<\/b> بشأن شقة حي الياسمين — وحدّد موعد معاينة الخميس.<\/div>\n          <\/div>\n        <\/div>\n        <div class=\"act\">\n          <div class=\"act-ic ai\"><i data-lucide=\"megaphone\"><\/i><\/div>\n          <div class=\"act-body\">\n            <div class=\"act-row\">\n              <span class=\"act-title\">منشئ المحتوى<\/span>\n              <span class=\"act-time\">قبل ٣ دقائق<\/span>\n            <\/div>\n            <div class=\"act-text\">نشر إعلاناً جديداً عن فيلا في <b>حي الملقا<\/b> على تويتر وانستغرام.<\/div>\n          <\/div>\n        <\/div>\n        <div class=\"act\">\n          <div class=\"act-ic green\"><i data-lucide=\"banknote\"><\/i><\/div>\n          <div class=\"act-body\">\n            <div class=\"act-row\">\n              <span class=\"act-title\">موظف التحصيل<\/span>\n              <span class=\"act-time\">قبل ١٢ دقيقة<\/span>\n            <\/div>\n            <div class=\"act-text\">حصّل إيجار <b>مكتب العليا<\/b> — أُرسل الإيصال للمستأجر.<\/div>\n          <\/div>\n        <\/div>\n        <div class=\"act\">\n          <div class=\"act-ic ai\"><i data-lucide=\"bar-chart-3\"><\/i><\/div>\n          <div class=\"act-body\">\n            <div class=\"act-row\">\n              <span class=\"act-title\">المحلّل الأسبوعي<\/span>\n              <span class=\"act-time\">قبل ساعة<\/span>\n            <\/div>\n            <div class=\"act-text\">جهّز تقرير الأسبوع: <b>٣٤ ليد جديد<\/b>، معدّل تحويل ٨٫٢٪.<\/div>\n          <\/div>\n        <\/div>\n      <\/div>\n      <div class=\"hv-foot\">\n        <div class=\"stat\"><strong>١٢٧<\/strong> مهمّة مكتملة اليوم<\/div>\n        <div class=\"stat\">يعادل عمل <strong>٤ موظفين بشريين<\/strong><\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- ============== HOW (MAS) ============== -->\n<section class=\"sec alt\" id=\"how\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <div class=\"sec-kicker\">كيف تعمل المنظومة<\/div>\n      <h2 class=\"sec-title\">نظام أعمال حقيقي — لا «بوت» واحد<\/h2>\n      <p class=\"sec-sub\">\n        أنت في رأس الهرم. تحتك خمسة مدراء ذكاء اصطناعي، كلٌّ منهم يقود فريقاً تنفيذياً متخصّصاً.\n        كلّ مهمّة تذهب لمن يجيدها — والقرار النهائي يبقى لك.\n      <\/p>\n    <\/div>\n\n    <div class=\"mas\">\n      <div class=\"mas-inner\">\n\n        <!-- CEO = the broker -->\n        <div class=\"ceo\">\n          أنت — CEO\n          <small>المالك. القرار النهائي.<\/small>\n        <\/div>\n        <div class=\"ceo-stem\"><\/div>\n\n        <!-- 5 Managers -->\n        <div class=\"managers\">\n\n          <div class=\"mgr\">\n            <div class=\"mgr-ic\"><i data-lucide=\"message-circle-heart\"><\/i><\/div>\n            <h5>مدير خدمة العملاء<\/h5>\n            <p>محادثات، مواعيد، استفسارات<\/p>\n            <div class=\"mgr-stem\"><\/div>\n            <div class=\"workers\">\n              <div class=\"worker\"><i data-lucide=\"message-circle\"><\/i> موظف الواتساب<\/div>\n              <div class=\"worker\"><i data-lucide=\"phone-call\"><\/i> منسّق الاستفسارات<\/div>\n              <div class=\"worker\"><i data-lucide=\"calendar\"><\/i> منسّق المعاينات<\/div>\n            <\/div>\n          <\/div>\n\n          <div class=\"mgr\">\n            <div class=\"mgr-ic\"><i data-lucide=\"megaphone\"><\/i><\/div>\n            <h5>مدير التسويق<\/h5>\n            <p>محتوى، إعلانات، حملات<\/p>\n            <div class=\"mgr-stem\"><\/div>\n            <div class=\"workers\">\n              <div class=\"worker\"><i data-lucide=\"pen-tool\"><\/i> منشئ المحتوى<\/div>\n              <div class=\"worker\"><i data-lucide=\"image\"><\/i> مصمّم الإعلانات<\/div>\n            <\/div>\n          <\/div>\n\n          <div class=\"mgr\">\n            <div class=\"mgr-ic\"><i data-lucide=\"building-2\"><\/i><\/div>\n            <h5>مدير إدارة الأملاك<\/h5>\n            <p>مستأجرون، صيانة، عقود<\/p>\n            <div class=\"mgr-stem\"><\/div>\n            <div class=\"workers\">\n              <div class=\"worker\"><i data-lucide=\"bell\"><\/i> منبّه الإيجارات<\/div>\n              <div class=\"worker\"><i data-lucide=\"wrench\"><\/i> منسّق الصيانة<\/div>\n              <div class=\"worker\"><i data-lucide=\"file-signature\"><\/i> منسّق العقود<\/div>\n            <\/div>\n          <\/div>\n\n          <div class=\"mgr\">\n            <div class=\"mgr-ic\"><i data-lucide=\"banknote\"><\/i><\/div>\n            <h5>المدير المالي<\/h5>\n            <p>تحصيل، فوترة، تقارير<\/p>\n            <div class=\"mgr-stem\"><\/div>\n            <div class=\"workers\">\n              <div class=\"worker\"><i data-lucide=\"receipt\"><\/i> موظف التحصيل<\/div>\n              <div class=\"worker\"><i data-lucide=\"calculator\"><\/i> محاسب ZATCA<\/div>\n            <\/div>\n          <\/div>\n\n          <div class=\"mgr\">\n            <div class=\"mgr-ic\"><i data-lucide=\"trending-up\"><\/i><\/div>\n            <h5>مدير التطوير + BizDev<\/h5>\n            <p>تحليل، فرص، توصيات<\/p>\n            <div class=\"mgr-stem\"><\/div>\n            <div class=\"workers\">\n              <div class=\"worker\"><i data-lucide=\"snowflake\"><\/i> متابع الليدز<\/div>\n              <div class=\"worker\"><i data-lucide=\"bar-chart-3\"><\/i> محلّل الأسبوع<\/div>\n            <\/div>\n          <\/div>\n\n        <\/div>\n\n        <div class=\"mas-foot\">\n          <div class=\"mas-foot-item\"><i data-lucide=\"clock\"><\/i> يعمل ٢٤ ساعة × ٧ أيام<\/div>\n          <div class=\"mas-foot-item\"><i data-lucide=\"users\"><\/i> ١٢ موظفاً متخصّصاً<\/div>\n          <div class=\"mas-foot-item\"><i data-lucide=\"user-check\"><\/i> القرار الحرج بيدك دائماً<\/div>\n        <\/div>\n\n      <\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- ============== FEATURES — WHAT IT DOES FOR YOU ============== -->\n<section class=\"sec\" id=\"features\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <div class=\"sec-kicker\">ماذا ينفّذون عنك<\/div>\n      <h2 class=\"sec-title\">ست مهام يومية تسحبها المنظومة من جدولك<\/h2>\n      <p class=\"sec-sub\">\n        كلّ ما يستهلك وقتك ويُبعدك عن الإغلاقات الحقيقية — يصبح آلياً ومدروساً.\n      <\/p>\n    <\/div>\n\n    <div class=\"cards\">\n\n      <div class=\"card\">\n        <div class=\"card-ic\"><i data-lucide=\"message-circle\"><\/i><\/div>\n        <h4>رد ذكي على واتساب ٢٤/٧<\/h4>\n        <p>\n          يجاوب العملاء فوراً بنبرتك الشخصية، يُميّز الجاد من الفضولي،\n          ويحجز موعد المعاينة في تقويمك مباشرةً.\n        <\/p>\n        <span class=\"card-tag\"><i data-lucide=\"zap\"><\/i> متوسط الرد: ٢٢ ثانية<\/span>\n      <\/div>\n\n      <div class=\"card\">\n        <div class=\"card-ic\"><i data-lucide=\"megaphone\"><\/i><\/div>\n        <h4>منشورات يومية ضمن نطاقك<\/h4>\n        <p>\n          محتوى مخصّص لأحياء الرياض التي تعمل فيها — الياسمين، الملقا، النرجس —\n          بنبرتك الشخصية وصور احترافية وأسعار محدّثة.\n        <\/p>\n        <span class=\"card-tag\"><i data-lucide=\"map-pin\"><\/i> ملتزم جغرافياً ونبرياً<\/span>\n      <\/div>\n\n      <div class=\"card\">\n        <div class=\"card-ic\"><i data-lucide=\"snowflake\"><\/i><\/div>\n        <h4>متابعة العملاء الباردين<\/h4>\n        <p>\n          ليد سألك قبل شهر ولم يردّ؟ المنظومة تُتابعه برسائل مدروسة في الوقت المناسب\n          وتُعيده إلى مسار البيع.\n        <\/p>\n        <span class=\"card-tag\"><i data-lucide=\"trending-up\"><\/i> +٣١٪ معدّل تحويل<\/span>\n      <\/div>\n\n      <div class=\"card\">\n        <div class=\"card-ic\"><i data-lucide=\"bell\"><\/i><\/div>\n        <h4>تذكيرات الإيجارات والتحصيل<\/h4>\n        <p>\n          ينبّه المستأجرين قبل الاستحقاق، يُرسل روابط الدفع،\n          ويُسجّل الإيصالات بصياغة ZATCA إلكترونياً.\n        <\/p>\n        <span class=\"card-tag\"><i data-lucide=\"receipt\"><\/i> فاتورة ZATCA تلقائية<\/span>\n      <\/div>\n\n      <div class=\"card\">\n        <div class=\"card-ic\"><i data-lucide=\"file-signature\"><\/i><\/div>\n        <h4>عقود إلكترونية بتوقيع SHA‑256<\/h4>\n        <p>\n          يُصيغ العقد، يُرسله للطرفين للتوقيع الرقمي،\n          ويختمه ببصمة <b>SHA‑256<\/b> غير قابلة للتعديل.\n        <\/p>\n        <span class=\"card-tag\"><i data-lucide=\"shield-check\"><\/i> توقيع موثوق قانونياً<\/span>\n      <\/div>\n\n      <div class=\"card\">\n        <div class=\"card-ic\"><i data-lucide=\"bar-chart-3\"><\/i><\/div>\n        <h4>تقرير أسبوعي + تنبيه القرارات<\/h4>\n        <p>\n          صباح كلّ أحد: تقرير مكتمل عن الأداء.\n          وأي قرار حرج — تخفيض سعر، إلغاء عقد — يصلك تنبيه فوري للموافقة.\n        <\/p>\n        <span class=\"card-tag\"><i data-lucide=\"alert-triangle\"><\/i> أنت تُقرّر، النظام يُنفّذ<\/span>\n      <\/div>\n\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- ============== LEGAL ============== -->\n<section class=\"sec alt\" id=\"legal\">\n  <div class=\"wrap\">\n    <div class=\"legal-grid\">\n      <div>\n        <div class=\"sec-kicker\">حماية قانونية مدمجة<\/div>\n        <h2 class=\"sec-title\" style=\"font-size: clamp(26px,3.2vw,36px);\">حمايتك القانونية أولاً.<\/h2>\n        <p class=\"sec-sub\" style=\"font-size:16px;\">\n          ليست أداة عامّة عُرِّبت — بل مبنيّة من اليوم الأول على متطلّبات النظام السعودي.\n          القرار يبقى بيدك، والقانون يحميك.\n        <\/p>\n\n        <div class=\"legal-list\">\n\n          <div class=\"legal-item\">\n            <i data-lucide=\"user-check\"><\/i>\n            <div>\n              <h5>بوّابات موافقة (Approval Gates)<\/h5>\n              <p>\n                لا قرار حرج — تخفيض سعر، إلغاء عقد، رفض عميل — يُنفَّذ دون توقيعك الصريح.\n              <\/p>\n            <\/div>\n          <\/div>\n\n          <div class=\"legal-item\">\n            <i data-lucide=\"shield-check\"><\/i>\n            <div>\n              <h5>التزام REGA كامل<\/h5>\n              <p>\n                كل إعلان يُنشر يحمل رقم ترخيصك الإعلاني، ويتوافق مع لوائح الهيئة العامة للعقار.\n              <\/p>\n            <\/div>\n          <\/div>\n\n          <div class=\"legal-item\">\n            <i data-lucide=\"receipt\"><\/i>\n            <div>\n              <h5>فواتير ZATCA متطابقة<\/h5>\n              <p>\n                فواتير إلكترونية متوافقة مع متطلبات ZATCA،\n                مع QR وختم زمني لكلّ تحصيل.\n              <\/p>\n            <\/div>\n          <\/div>\n\n          <div class=\"legal-item\">\n            <i data-lucide=\"lock\"><\/i>\n            <div>\n              <h5>تشفير + RLS متعدّد المستأجرين<\/h5>\n              <p>\n                بنية سحابية موثوقة، تشفير قوي على مستوى الحقل، وعزل صفّي لكل وسيط على مستوى قاعدة البيانات.\n              <\/p>\n            <\/div>\n          <\/div>\n\n        <\/div>\n      <\/div>\n\n      <!-- Approval Gate visual -->\n      <div class=\"gate\">\n        <div class=\"gate-head\">\n          <h5>بوّابة الموافقة (Approval Gate)<\/h5>\n          <span class=\"badge\">قرار حرج<\/span>\n        <\/div>\n\n        <div class=\"gate-row\">\n          <div class=\"ic alert\"><i data-lucide=\"trending-down\"><\/i><\/div>\n          <div class=\"body\">\n            <strong>طلب تخفيض سعر فيلا الملقا<\/strong>\n            <span>اقتراح: ١٫٨م → ١٫٧م ريال<\/span>\n          <\/div>\n          <div class=\"gate-actions\">\n            <button class=\"gate-btn\">رفض<\/button>\n            <button class=\"gate-btn ok\">موافقة<\/button>\n          <\/div>\n        <\/div>\n\n        <div class=\"gate-row\">\n          <div class=\"ic\"><i data-lucide=\"file-x\"><\/i><\/div>\n          <div class=\"body\">\n            <strong>إنهاء عقد إيجار قبل المدّة<\/strong>\n            <span>المستأجر: شركة الفجر التجارية<\/span>\n          <\/div>\n          <div class=\"gate-actions\">\n            <button class=\"gate-btn\">رفض<\/button>\n            <button class=\"gate-btn ok\">موافقة<\/button>\n          <\/div>\n        <\/div>\n\n        <div class=\"gate-row\">\n          <div class=\"ic\"><i data-lucide=\"user-x\"><\/i><\/div>\n          <div class=\"body\">\n            <strong>تجاوز عميل غير مؤهّل<\/strong>\n            <span>السبب: لم يُكمل التحقّق من الهوية<\/span>\n          <\/div>\n          <div class=\"gate-actions\">\n            <button class=\"gate-btn\">رفض<\/button>\n            <button class=\"gate-btn ok\">موافقة<\/button>\n          <\/div>\n        <\/div>\n\n        <p class=\"muted\" style=\"margin: 16px 0 0; font-size: 12.5px; line-height: 1.7;\">\n          النظام يُجهّز الخيارات. أنت توقّع.\n        <\/p>\n      <\/div>\n\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- ============== LEARNING LOOP ============== -->\n<section class=\"sec\" id=\"learn\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <div class=\"sec-kicker ai\">الذكاء التراكمي<\/div>\n      <h2 class=\"sec-title\">كيف يتعلّم النظام منك<\/h2>\n      <p class=\"sec-sub\">\n        لست مضطراً لتعليم اثني عشر موظفاً واحداً واحداً.\n        تكتب توجيهاتك مرة، فتنزل تلقائياً إلى كلّ موظف بصيغته التشغيلية.\n      <\/p>\n    <\/div>\n\n    <div class=\"learn-grid\">\n\n      <div class=\"learn-step\">\n        <div class=\"num\">١<\/div>\n        <h4>تكتب توجيهاتك الاستراتيجية مرة واحدة<\/h4>\n        <p>\n          بنبرتك. بلهجتك. تُحدّد نطاقك، أسلوبك مع العملاء، وأولوياتك للربع القادم.\n        <\/p>\n        <div class=\"learn-mock\">\n          <span class=\"label\">توجيهك<\/span>\n          ركّز هذا الربع على <b>شقق الياسمين والنرجس<\/b>.\n          نبرتي مع العملاء: مهنية بدون رسميّة زائدة.\n          لا تخفّض السعر أكثر من ٥٪ بدون موافقتي.\n        <\/div>\n      <\/div>\n\n      <div class=\"learn-step\">\n        <div class=\"num\">٢<\/div>\n        <h4>الذكاء يُحوّلها لتوجيهات تشغيلية<\/h4>\n        <p>\n          المدراء يُترجمون هدفك إلى تعليمات يومية مفصّلة لكلّ موظف تنفيذي تحتهم.\n        <\/p>\n        <div class=\"learn-mock\">\n          <span class=\"label\">إلى منشئ المحتوى<\/span>\n          ٤ منشورات/أسبوع عن الياسمين والنرجس.\n          <span class=\"arrow\">↓<\/span>\n          <span class=\"label\">إلى موظف الواتساب<\/span>\n          أعطِ أولوية للمستفسرين عن الحيّين.\n        <\/div>\n      <\/div>\n\n      <div class=\"learn-step\">\n        <div class=\"num\">٣<\/div>\n        <h4>مراجعة يومية + اقتراحات تحسين<\/h4>\n        <p>\n          المدراء يُراجعون أداء فِرَقهم يومياً ويقترحون تعديلات. أنت توافق أو ترفض بضغطة.\n        <\/p>\n        <div class=\"learn-mock\">\n          <span class=\"label\">اقتراح من مدير التسويق<\/span>\n          منشورات النرجس تحقّق تفاعلاً أعلى بـ <b>٢٫٤×<\/b>.\n          أقترح تحويل ٧٠٪ من المحتوى إليه الأسبوع القادم.\n          <span class=\"arrow\">↓ توافق؟<\/span>\n        <\/div>\n      <\/div>\n\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- ============== PRICING ============== -->\n<section class=\"sec alt\" id=\"pricing\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <div class=\"sec-kicker\">الأسعار<\/div>\n      <h2 class=\"sec-title\">خطط واضحة. بلا التزامات سنوية.<\/h2>\n      <p class=\"sec-sub\">\n        ابدأ مجرّباً سبعة أيام بكلّ الميزات. كلّ الخطط تشمل التزام REGA وفوترة ZATCA.\n      <\/p>\n    <\/div>\n\n    <div class=\"pricing\">\n\n      <div class=\"plan\">\n        <h4>مجرّب<\/h4>\n        <p class=\"plan-desc\">جرّب المنظومة كاملةً قبل الالتزام.<\/p>\n        <div class=\"plan-price\">\n          <span class=\"amt\">٠<\/span>\n          <span class=\"cur\">ر.س<\/span>\n        <\/div>\n        <p class=\"plan-period\">سبعة أيام • كل الميزات • بدون بطاقة<\/p>\n        <ul class=\"plan-features\">\n          <li><i data-lucide=\"check\"><\/i> الخمسة المدراء + ١٢ موظفاً<\/li>\n          <li><i data-lucide=\"check\"><\/i> رد واتساب ٢٤/٧<\/li>\n          <li><i data-lucide=\"check\"><\/i> منشورات ومحتوى يومي<\/li>\n          <li><i data-lucide=\"check\"><\/i> تحصيل + فوترة ZATCA<\/li>\n          <li><i data-lucide=\"check\"><\/i> عقود SHA‑256<\/li>\n          <li><i data-lucide=\"check\"><\/i> تقرير أسبوعي كامل<\/li>\n        <\/ul>\n        <a href=\"/register\" class=\"btn btn-ghost\">ابدأ المجرّب<\/a>\n      <\/div>\n\n      <div class=\"plan featured\">\n        <span class=\"plan-tag\">الأكثر اختياراً<\/span>\n        <h4>محترف<\/h4>\n        <p class=\"plan-desc\">للوسيط الفردي النشط.<\/p>\n        <div class=\"plan-price\">\n          <span class=\"amt\">٤٩٧<\/span>\n          <span class=\"cur\">ر.س<\/span>\n        <\/div>\n        <p class=\"plan-period\">شهرياً • يُلغى متى شئت<\/p>\n        <ul class=\"plan-features\">\n          <li><i data-lucide=\"check\"><\/i> كل ميزات المجرّب<\/li>\n          <li><i data-lucide=\"check\"><\/i> رسائل واتساب غير محدودة<\/li>\n          <li><i data-lucide=\"check\"><\/i> منشورات على ٤ منصّات يومياً<\/li>\n          <li><i data-lucide=\"check\"><\/i> توجيه استراتيجي مخصّص<\/li>\n          <li><i data-lucide=\"check\"><\/i> مراجعة يومية + اقتراحات<\/li>\n          <li><i data-lucide=\"check\"><\/i> تنبيه القرارات الحرجة<\/li>\n        <\/ul>\n        <a href=\"/register\" class=\"btn btn-primary\">اشترك الآن<\/a>\n      <\/div>\n\n      <div class=\"plan\">\n        <h4>وكالة<\/h4>\n        <p class=\"plan-desc\">لمكاتب الوساطة بفريق ٣–٥ وسطاء.<\/p>\n        <div class=\"plan-price\">\n          <span class=\"amt\">١٬٤٩٧<\/span>\n          <span class=\"cur\">ر.س<\/span>\n        <\/div>\n        <p class=\"plan-period\">شهرياً • حتى ٥ وسطاء<\/p>\n        <ul class=\"plan-features\">\n          <li><i data-lucide=\"check\"><\/i> كل ميزات المحترف<\/li>\n          <li><i data-lucide=\"check\"><\/i> لوحة CEO موحّدة للوكالة<\/li>\n          <li><i data-lucide=\"check\"><\/i> توزيع آلي للّيدز بين الوسطاء<\/li>\n          <li><i data-lucide=\"check\"><\/i> إدارة جماعية + صلاحيات<\/li>\n          <li><i data-lucide=\"check\"><\/i> تقارير أداء فردية<\/li>\n          <li><i data-lucide=\"check\"><\/i> دعم مخصّص + مدير حساب<\/li>\n        <\/ul>\n        <a href=\"mailto:vip.elyas@gmail.com?subject=استفسار باقة الوكالة\" class=\"btn btn-ghost\">تواصل مع المبيعات<\/a>\n      <\/div>\n\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- ============== FAQ ============== -->\n<section class=\"sec\" id=\"faq\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <div class=\"sec-kicker\">الأسئلة الشائعة<\/div>\n      <h2 class=\"sec-title\">قبل أن تبدأ — هذا ما يسأله الوسطاء عادةً<\/h2>\n    <\/div>\n\n    <div class=\"faq-list\">\n\n      <details class=\"faq-item\" open=\"\">\n        <summary class=\"faq-q\">\n          هل أحتاج مهارات تقنية لاستخدام المنصّة؟\n          <i class=\"chev\" data-lucide=\"chevron-down\"><\/i>\n        <\/summary>\n        <div class=\"faq-a\">\n          لا. الإعداد بالكامل عبر محادثة عربية بسيطة: تُخبرنا عن نطاقك الجغرافي،\n          نوع العقارات التي تركّز عليها، ونبرتك مع العملاء — وننتهي خلال أقل من ٢٠ دقيقة.\n          لا أكواد ولا تكاملات معقّدة.\n        <\/div>\n      <\/details>\n\n      <details class=\"faq-item\">\n        <summary class=\"faq-q\">\n          هل آمن قانونياً؟ ومن المسؤول إذا قال الذكاء الاصطناعي شيئاً خطأً؟\n          <i class=\"chev\" data-lucide=\"chevron-down\"><\/i>\n        <\/summary>\n        <div class=\"faq-a\">\n          كل قرار ذي أثر قانوني — تخفيض سعر، توقيع عقد، إلغاء، رفض عميل —\n          يمرّ عبر <b>بوّابة موافقة<\/b> ولا يُنفَّذ إلا بتوقيعك الصريح.\n          المسؤولية القانونية تبقى عليك بصفتك الوسيط المرخّص (هذا ما يضمن مشروعية النظام أمام REGA)،\n          والمنصّة لا تتّخذ نيابةً عنك أيّ قرار من هذه الفئة. كل المحادثات والقرارات قابلة للتدقيق ولها سجلّ زمني.\n        <\/div>\n      <\/details>\n\n      <details class=\"faq-item\">\n        <summary class=\"faq-q\">\n          كم تكلفة استدعاءات الذكاء الاصطناعي على فاتورتي؟\n          <i class=\"chev\" data-lucide=\"chevron-down\"><\/i>\n        <\/summary>\n        <div class=\"faq-a\">\n          صفر. كل تكاليف نماذج الذكاء الاصطناعي مشمولة في اشتراكك الشهري الثابت،\n          بما في ذلك ردود الواتساب والمحتوى والتحليلات. لا يوجد تسعير حسب الاستدعاء ولا رسوم خفية.\n        <\/div>\n      <\/details>\n\n      <details class=\"faq-item\">\n        <summary class=\"faq-q\">\n          هل يربط بحسابات السوشل ميديا الحالية؟\n          <i class=\"chev\" data-lucide=\"chevron-down\"><\/i>\n        <\/summary>\n        <div class=\"faq-a\">\n          نعم. يتكامل مباشرةً مع تويتر (X)، إنستغرام، فيسبوك، وتيك توك عبر الـAPI الرسمي لكلٍّ منها.\n          تربط حساباتك مرة واحدة عند الإعداد، ويتولّى منشئ المحتوى ومصمّم الإعلانات النشر بنبرتك ضمن الجدول المتفق عليه.\n        <\/div>\n      <\/details>\n\n      <details class=\"faq-item\">\n        <summary class=\"faq-q\">\n          هل يعمل مع واتساب الشخصي أم رقم منفصل؟\n          <i class=\"chev\" data-lucide=\"chevron-down\"><\/i>\n        <\/summary>\n        <div class=\"faq-a\">\n          الاثنان متاحان. الموصى به هو ربط رقم <b>WhatsApp Business<\/b> الخاص بعملك عبر الـAPI الرسمي\n          (أكثر استقراراً ويسمح بصلاحيات أوسع). إن أردت الاحتفاظ بالشخصي، يمكن تفعيله عبر طبقة جسر آمنة\n          مع نفس بوّابة الموافقات.\n        <\/div>\n      <\/details>\n\n      <details class=\"faq-item\">\n        <summary class=\"faq-q\">\n          كيف ألغي الاشتراك؟\n          <i class=\"chev\" data-lucide=\"chevron-down\"><\/i>\n        <\/summary>\n        <div class=\"faq-a\">\n          بضغطة واحدة من إعدادات حسابك — لا مكالمات، لا نماذج، لا فترات إخطار.\n          يبقى وصولك متاحاً حتى نهاية فترة الفوترة الجارية، ويمكنك تصدير كامل بياناتك (محادثات، عقود، تقارير) كملفّات قبل الإغلاق.\n        <\/div>\n      <\/details>\n\n    <\/div>\n  <\/div>\n<\/section>\n\n<!-- ============== FINAL CTA ============== -->\n<section class=\"sec\" id=\"cta\">\n  <div class=\"wrap\">\n    <div class=\"final-cta\">\n      <h2>تستحق وسيطاً يعمل لك.<\/h2>\n      <p>\n        سبعة أيام تجرّب فيها فريقاً كاملاً يعمل بدلاً منك. بدون بطاقة ائتمان.\n        إن لم يضاعف إنتاجيتك، تُلغي بضغطة زر.\n      <\/p>\n      <div class=\"cta-row\">\n        <a href=\"/register\" class=\"btn btn-primary\"> ابدأ تجربتك\n          <i data-lucide=\"arrow-left\"><\/i>\n        <\/a>\n        <a href=\"#\" class=\"btn btn-line\">\n          <i data-lucide=\"calendar\"><\/i>\n          احجز عرضاً مع فريقنا\n        <\/a>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/section>\n\n<\/main>\n\n<!-- ============== FOOTER ============== -->\n<footer>\n  <div class=\"wrap\">\n    <div class=\"foot-grid\">\n      <div class=\"foot-about\">\n        <a class=\"brand\" href=\"#\">\n          <span class=\"brand-mark\">و<\/span>\n          <span>وسيط برو<\/span>\n        <\/a>\n        <p>\n          أوّل منصّة Multi‑Agent سعودية مخصّصة للوسطاء العقاريين المرخّصين.\n          نظام أعمال حقيقي يعمل بدلاً عنك ٢٤/٧.\n        <\/p>\n      <\/div>\n\n      <div class=\"foot-col\">\n        <h6>المنتج<\/h6>\n        <ul>\n          <
